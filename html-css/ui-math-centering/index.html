<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Centering Examples</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
  }

  h2 {
    text-align: center;
    margin: 10px 0;
  }

  .container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding: 10px;
  }

  .section {
    height: 40vh;
    position: relative;
    border: 1px solid #333;

    /* grid background */
    background-image:
      linear-gradient(#222 1px, transparent 1px),
      linear-gradient(90deg, #222 1px, transparent 1px);
    background-size: 30px 30px;
  }

  /* center cross */
  .section::before,
  .section::after {
    content: "";
    position: absolute;
    background: red;
  }

  .section::before {
    width: 2px;
    height: 100%;
    left: 50%;
  }

  .section::after {
    height: 2px;
    width: 100%;
    top: 50%;
  }

  /* box */
  .box {
    width: 80px;
    height: 80px;
    background: lime;
  }

  /* 1. margin (wrong) */
  .margin .box {
    margin: 0 auto;
    margin-top: 20px;
  }

  /* 2. flex */
  .flex {
    display: flex;
    justify-content: center;
    align-items: center;
  }

  /* 3. absolute + transform */
  .absolute .box {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  /* 4. grid */
  .grid {
    display: grid;
    place-items: center;
  }

</style>
</head>

<body>

<div class="container">

  <div>
    <h2>❌ Margin</h2>
    <div class="section margin">
      <div class="box"></div>
    </div>
  </div>

  <div>
    <h2>✅ Flexbox</h2>
    <div class="section flex">
      <div class="box"></div>
    </div>
  </div>

  <div>
    <h2>🔥 Transform</h2>
    <div class="section absolute">
      <div class="box"></div>
    </div>
  </div>

  <div>
    <h2>⚡ Grid</h2>
    <div class="section grid">
      <div class="box"></div>
    </div>
  </div>

</div>

</body>
</html>
