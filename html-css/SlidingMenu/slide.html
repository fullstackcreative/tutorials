<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Sliding Menu</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="slide.css" />
  </head>
  <body>
    <div class="container">
     
      <div class="toggle">
        <input type="radio" name="tab" id="t1">
        <input type="radio" name="tab" id="t2">
        <input type="radio" name="tab" id="t3">
        <input type="radio" name="tab" id="t4">
        <div class="slider"></div>
        <label for="t1">Day</label>
        <label for="t2">Week</label>
        <label for="t3">Month</label>
        <label for="t4">Year</label>
      </div>
      
    </div>
  </body>
</html>
