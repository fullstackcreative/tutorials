<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Glassmorphism Pricing</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="glass.css" />
  </head>

  <body>
    <div class="container">
      <h1>Subscription Plans</h1>
      <p class="subtitle">
        Upgrade to access User Roles and Permissions, Mobile accessibility,
        integration with AI Tools and Standard Customer support.
      </p>

      <div class="toggle">
        <button class="active">Monthly</button>
        <button>Annual</button>
      </div>

      <div class="pricing">
        <div class="card">
          <span class="runner"></span>

          <div class="card-content">
            <h3>Professional</h3>
            <div class="price">$24</div>
            <p>per user / per month</p>
            <button class="btn">Current Plan</button>
          </div>
        </div>
      </div>

      <p class="note">100% secure payment method with money back guarantee</p>

      <button class="upgrade">Upgrade Now</button>
    </div>
  </body>
</html>
