<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Glassmorphism Pricing</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="pricing">
      <div class="card">
        <span class="line top"></span> 
        <span class="line right"></span>            
          <div class="card-content">
          <h3>Basic</h3>
          <div class="price">$100</div>
          <p>per user / permonth</p>
          <button class="btn">Current Plan</button>
        </div>
      </div>
    </div>
  </body>
</html>
